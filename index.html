<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PJSK Calculator</title>

<style>
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  overflow: hidden;
  transition: 0.4s;
}

/* MODES */
body.default { background: linear-gradient(135deg,#ffe4f2,#e0f7ff,#f3e5ff); }
body.leoneed { background: linear-gradient(135deg,#1e2a78,#4a6cf7,#8faaff); }
body.vbs { background: linear-gradient(135deg,#ff6a00,#ff2e63,#252525); }
body.wxS { background: linear-gradient(135deg,#ffcc00,#ff66cc,#66ccff); }
body.n25 { background: linear-gradient(135deg,#2b2b2b,#6e44ff,#000000); }
body.mmj { background: linear-gradient(135deg,#a8ffb0,#ffd6ec,#fff); }

.calculator {
  position: relative;
  z-index: 2;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 25px;
  width: 280px;
  margin: auto;
  top: 50%;
  transform: translateY(-50%);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.title {
  text-align: center;
  font-size: 18px;
  margin-bottom: 5px;
}

.combo {
  text-align: center;
  font-size: 14px;
  color: #ff66cc;
  margin-bottom: 10px;
}

.display {
  width: 100%;
  height: 50px;
  border: none;
  border-radius: 15px;
  margin-bottom: 15px;
  padding: 10px;
  font-size: 18px;
  text-align: right;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 10px;
}

button {
  border: none;
  padding: 15px;
  border-radius: 15px;
  font-size: 15px;
  cursor: pointer;
  background: linear-gradient(145deg,#ffd6e8,#e0f7fa);
  transition: 0.2s;
}

button:hover {
  transform: scale(1.1);
}

.equal {
  background: linear-gradient(145deg,#cdb4ff,#ffc8dd);
}

/* MODE BUTTONS */
.modes {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 10px;
}

.mode-btn {
  font-size: 10px;
  padding: 5px;
  border-radius: 8px;
}

/* PARTICLES */
.particle {
  position: absolute;
  width: 8px;
  height: 8px;
  background: white;
  border-radius: 50%;
  opacity: 0.7;
  animation: float 2s linear forwards;
}

@keyframes float {
  from { transform: translateY(0); opacity:1;}
  to { transform: translateY(-100px); opacity:0;}
}
</style>
</head>

<body class="default">

<div class="calculator">
  <div class="title">🎤 PJSK Calculator</div>
  <div class="combo" id="combo">Combo: 0</div>

  <div class="modes">
    <button class="mode-btn" onclick="setMode('default')">Pastel</button>
    <button class="mode-btn" onclick="setMode('leoneed')">Leo/Need</button>
    <button class="mode-btn" onclick="setMode('vbs')">VBS</button>
    <button class="mode-btn" onclick="setMode('wxS')">WxS</button>
    <button class="mode-btn" onclick="setMode('n25')">Nightcord</button>
    <button class="mode-btn" onclick="setMode('mmj')">MMJ</button>
  </div>

  <input type="text" id="display" class="display" disabled>

  <div class="buttons">
    <button onclick="press('C')">C</button>
    <button onclick="press('%')">%</button>
    <button onclick="press('/')">÷</button>
    <button onclick="press('*')">×</button>

    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button onclick="press('-')">−</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button onclick="press('+')">+</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button class="equal" onclick="calculate()">=</button>

    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
  </div>
</div>

<script>
let combo = 0;

/* SOUND */
const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

function playSound() {
  audio.currentTime = 0;
  audio.play();
}

/* PARTICLES */
function createParticle() {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random()*window.innerWidth + "px";
  p.style.top = window.innerHeight + "px";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),2000);
}

/* PRESS */
function press(val) {
  playSound();
  createParticle();

  if(val==="C"){
    document.getElementById("display").value="";
    combo=0;
  } else {
    document.getElementById("display").value+=val;
    combo++;
  }
  updateCombo();
}

/* CALCULATE */
function calculate(){
  try{
    document.getElementById("display").value =
      eval(document.getElementById("display").value);
    combo+=5;
  }catch{
    document.getElementById("display").value="Error";
    combo=0;
  }
  updateCombo();
}

/* COMBO DISPLAY */
function updateCombo(){
  document.getElementById("combo").innerText="Combo: "+combo;
}

/* MODE SWITCH */
function setMode(mode){
  document.body.className = mode;
}
</script>

</body>
</html>
