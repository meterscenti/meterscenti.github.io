<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Pastel Space</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: linear-gradient(to bottom right, #fceff9, #e0f7fa);
      color: #555;
    }

    header {
      background: #ffd6e8;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: #6a4e77;
      letter-spacing: 2px;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      background: #fff0f6;
      padding: 10px;
    }

    nav a {
      text-decoration: none;
      color: #6a4e77;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 10px;
      transition: 0.3s;
    }

    nav a:hover {
      background: #ffd6e8;
    }

    .container {
      padding: 40px;
      text-align: center;
    }

    .card {
      background: #ffffffcc;
      margin: 20px auto;
      padding: 20px;
      width: 300px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    button {
      background: #ffd6e8;
      border: none;
      padding: 10px 20px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    button:hover {
      background: #ffb3d9;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #fff0f6;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  🌸 My Pastel Space
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Projects</a>
</nav>

<div class="container">

  <div class="card">
    <h2>Welcome 💕</h2>
    <p>This is your aesthetic pastel website.</p>
    <button onclick="hello()">Click Me</button>
  </div>

  <div class="card">
    <h2>About Me 📚</h2>
    <p>I love soft colors, learning, and creating.</p>
  </div>

</div>

<footer>
  ✨ Made with pastel vibes
</footer>

<script>
  function hello() {
    alert("Hello! Welcome to your pastel site 🌸");
  }
</script>

</body>
</html>
